<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .table thead th { border: none; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .back-link { color: #667eea; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <a href="/" class="back-link mb-3 d-inline-block">← Volver al inicio</a>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <h1 class="h3 fw-bold mb-0" style="color:#667eea;">👥 Gestión de Usuarios</h1>
        <a href="/register" class="btn btn-grad fw-bold">
            <i class="bi bi-person-plus"></i> Nuevo Usuario
        </a>
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Nombre</th>
                    <th class="d-none d-md-table-cell">Rol</th>
                    <th class="d-none d-md-table-cell">Estado</th>
                    <th class="d-none d-lg-table-cell">Fecha Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td class="fw-semibold" th:text="${usuario.username}"></td>
                    <td th:text="${usuario.nombreCompleto}"></td>
                    <td class="d-none d-md-table-cell">
                        <span class="badge bg-primary" th:text="${usuario.rol}"></span>
                    </td>
                    <td class="d-none d-md-table-cell">
                        <span th:if="${usuario.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${usuario.activo}" class="badge bg-secondary">Inactivo</span>
                    </td>
                    <td class="d-none d-lg-table-cell"
                        th:text="${usuario.fechaRegistro != null ? #temporals.format(usuario.fechaRegistro, 'dd/MM/yyyy') : '-'}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <a th:if="${usuario.activo}"
                               th:href="@{/usuarios/desactivar/{id}(id=${usuario.id})}"
                               class="btn btn-sm btn-warning fw-bold"
                               onclick="return confirm('¿Desactivar este usuario?')">
                                <i class="bi bi-person-x"></i>
                            </a>
                            <a th:unless="${usuario.activo}"
                               th:href="@{/usuarios/activar/{id}(id=${usuario.id})}"
                               class="btn btn-sm btn-success fw-bold">
                                <i class="bi bi-person-check"></i>
                            </a>
                            <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}"
                               class="btn btn-sm btn-danger fw-bold"
                               onclick="return confirm('¿Eliminar este usuario?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
