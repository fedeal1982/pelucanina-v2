<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Turnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
        .cal-header div { text-align: center; font-weight: 700; font-size: 12px; color: #667eea; padding: 8px 0; text-transform: uppercase; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-cell { min-height: 90px; border: 2px solid #eee; border-radius: 10px; padding: 6px; background: #fafafa; transition: all 0.2s; cursor: pointer; }
        .cal-cell:hover { border-color: #667eea; background: #f0f4ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.2); }
        .cal-cell.hoy { border-color: #667eea; background: #f0f4ff; }
        .cal-cell.otro-mes { opacity: 0.4; }
        .cal-cell.tiene-turnos { border-color: #764ba2; }
        .dia-num { font-weight: 700; font-size: 13px; color: #444; margin-bottom: 4px; }
        .hoy .dia-num { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .turno-pill { border-radius: 5px; padding: 2px 5px; font-size: 9px; margin-bottom: 2px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: transform 0.15s; }
        .turno-pill:hover { transform: scale(1.05); }
        .turno-pill.pendiente { background: linear-gradient(135deg, #667eea, #764ba2); }
        .turno-pill.completado { background: linear-gradient(135deg, #28a745, #20c997); }
        .turno-pill.cancelado { background: #aaa; }
        .mas-turnos { font-size: 9px; color: #667eea; font-weight: 700; }
        .nav-mes { display: flex; align-items: center; gap: 15px; }
        .nav-btn { background: none; border: 2px solid #667eea; color: #667eea; border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .nav-btn:hover { background: #667eea; color: white; }
        .mes-titulo { font-size: 20px; font-weight: 700; color: #667eea; min-width: 180px; text-align: center; }

        /* Modal detalle */
        .modal-turno { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
        .modal-turno.show { display: flex; }
        .modal-content-custom { background: white; border-radius: 20px; padding: 30px; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .turno-detalle-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .turno-detalle-item:last-child { border-bottom: none; }
        .leyenda { display: flex; gap: 15px; flex-wrap: wrap; font-size: 12px; }
        .leyenda-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <h1 class="h3 fw-bold mb-0" style="color:#667eea;">🗓️ Calendario de Turnos</h1>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/turnos/nuevo" class="btn btn-grad btn-sm fw-bold">➕ Nuevo Turno</a>
            <a href="/turnos" class="btn btn-secondary btn-sm fw-bold">📋 Lista</a>
            <a href="/" class="btn btn-secondary btn-sm fw-bold">← Volver</a>
        </div>
    </div>

    <!-- Navegación de mes -->
    <div class="d-flex align-items-center justify-content-center mb-3">
        <div class="nav-mes">
            <button class="nav-btn" onclick="cambiarMes(-1)">&#8249;</button>
            <div class="mes-titulo" id="mesTitulo"></div>
            <button class="nav-btn" onclick="cambiarMes(1)">&#8250;</button>
        </div>
    </div>

    <!-- Calendario -->
    <div class="cal-header">
        <div>Dom</div><div>Lun</div><div>Mar</div>
        <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>

    <!-- Leyenda -->
    <div class="leyenda mt-3">
        <div class="d-flex align-items-center gap-1">
            <span class="leyenda-dot" style="background:linear-gradient(135deg,#667eea,#764ba2);"></span> Pendiente
        </div>
        <div class="d-flex align-items-center gap-1">
            <span class="leyenda-dot" style="background:#28a745;"></span> Completado
        </div>
        <div class="d-flex align-items-center gap-1">
            <span class="leyenda-dot" style="background:#aaa;"></span> Cancelado
        </div>
    </div>
</div>
</div>

<!-- Modal detalle del día -->
<div class="modal-turno" id="modalDia" onclick="cerrarModal(event)">
    <div class="modal-content-custom">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0" style="color:#667eea;" id="modalFecha"></h5>
            <button onclick="document.getElementById('modalDia').classList.remove('show')"
                    style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
        </div>
        <div id="modalContenido"></div>
        <a href="/turnos/nuevo" class="btn btn-grad fw-bold w-100 mt-3">➕ Nuevo Turno</a>
    </div>
</div>

<script th:inline="javascript">
    const turnosData = /*[[${turnos}]]*/ [];
</script>
<script>
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const hoy = new Date();
    let mesActual = hoy.getMonth();
    let anioActual = hoy.getFullYear();

    function cambiarMes(dir) {
        mesActual += dir;
        if (mesActual > 11) { mesActual = 0; anioActual++; }
        if (mesActual < 0) { mesActual = 11; anioActual--; }
        renderCalendario();
    }

    function getTurnosDia(fechaStr) {
        return turnosData.filter(t => t.fechaHora && t.fechaHora.substring(0, 10) === fechaStr);
    }

    function renderCalendario() {
        document.getElementById('mesTitulo').textContent = meses[mesActual] + ' ' + anioActual;
        const grid = document.getElementById('calGrid');
        const primerDia = new Date(anioActual, mesActual, 1).getDay();
        const diasEnMes = new Date(anioActual, mesActual + 1, 0).getDate();
        const diasMesAnterior = new Date(anioActual, mesActual, 0).getDate();

        let html = '';
        let totalCeldas = Math.ceil((primerDia + diasEnMes) / 7) * 7;

        for (let i = 0; i < totalCeldas; i++) {
            let dia, esMesActual = true;
            if (i < primerDia) {
                dia = diasMesAnterior - primerDia + i + 1;
                esMesActual = false;
            } else if (i >= primerDia + diasEnMes) {
                dia = i - primerDia - diasEnMes + 1;
                esMesActual = false;
            } else {
                dia = i - primerDia + 1;
            }

            const fechaStr = `${anioActual}-${String(mesActual + 1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
            const turnos = esMesActual ? getTurnosDia(fechaStr) : [];
            const esHoy = esMesActual && dia === hoy.getDate() && mesActual === hoy.getMonth() && anioActual === hoy.getFullYear();

            let clases = 'cal-cell';
            if (!esMesActual) clases += ' otro-mes';
            if (esHoy) clases += ' hoy';
            if (turnos.length > 0) clases += ' tiene-turnos';

            html += `<div class="${clases}" onclick="${esMesActual ? `abrirModal('${fechaStr}', ${dia})` : ''}">`;
            html += `<div class="dia-num">${dia}</div>`;

            const maxVisible = 2;
            turnos.slice(0, maxVisible).forEach(t => {
                const hora = t.fechaHora ? t.fechaHora.substring(11, 16) : '';
                const nombre = t.mascota ? t.mascota.nombre : '';
                const clase = t.estado === 'COMPLETADO' ? 'completado' : t.estado === 'CANCELADO' ? 'cancelado' : 'pendiente';
                html += `<a href="/turnos/editar/${t.id}" style="text-decoration:none;" onclick="event.stopPropagation()">
                    <div class="turno-pill ${clase}">${hora} ${nombre}</div>
                </a>`;
            });

            if (turnos.length > maxVisible) {
                html += `<div class="mas-turnos">+${turnos.length - maxVisible} más</div>`;
            }

            html += '</div>';
        }
        grid.innerHTML = html;
    }

    function abrirModal(fechaStr, dia) {
        const turnos = getTurnosDia(fechaStr);
        const partes = fechaStr.split('-');
        document.getElementById('modalFecha').textContent = `${dia} de ${meses[mesActual]} ${anioActual}`;

        let html = '';
        if (turnos.length === 0) {
            html = '<p class="text-muted text-center py-3">No hay turnos este día</p>';
        } else {
            turnos.forEach(t => {
                const hora = t.fechaHora ? t.fechaHora.substring(11, 16) : '';
                const nombre = t.mascota ? t.mascota.nombre : '-';
                const estado = t.estado || '-';
                const servicio = t.servicio || '-';
                const clase = estado === 'COMPLETADO' ? 'success' : estado === 'CANCELADO' ? 'secondary' : 'primary';
                html += `<div class="turno-detalle-item">
                    <div>
                        <strong>${hora}</strong> — ${nombre}<br>
                        <small class="text-muted">${servicio}</small>
                    </div>
                    <div>
                        <span class="badge bg-${clase}">${estado}</span>
                        <a href="/turnos/editar/${t.id}" class="btn btn-sm btn-warning ms-1">✏️</a>
                    </div>
                </div>`;
            });
        }

        document.getElementById('modalContenido').innerHTML = html;
        document.getElementById('modalDia').classList.add('show');
    }

    function cerrarModal(event) {
        if (event.target === document.getElementById('modalDia')) {
            document.getElementById('modalDia').classList.remove('show');
        }
    }

    renderCalendario();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
