<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .table thead th { border: none; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .back-link { color: #667eea; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <a href="/" class="back-link mb-3 d-inline-block">← Volver al inicio</a>
    <h1 class="h3 fw-bold mb-4" style="color:#667eea;">🗑️ Papelera de Mascotas</h1>

    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

	<div th:if="${!mascotas.isEmpty()}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th class="d-none d-md-table-cell">Especie</th>
                    <th class="d-none d-md-table-cell">Fecha Nacimiento</th>
                    <th class="d-none d-lg-table-cell">Dueño</th>
                    <th>Fecha Eliminación</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="mascota : ${mascotas}">
                    <td th:text="${mascota.numCliente}"></td>
                    <td class="fw-semibold" th:text="${mascota.nombre}"></td>
                    <td class="d-none d-md-table-cell" th:text="${mascota.especie ?: '-'}"></td>
                    <td class="d-none d-md-table-cell" th:text="${mascota.fechaNacimiento != null ? #temporals.format(mascota.fechaNacimiento, 'dd/MM/yyyy') : '-'}"></td>
                    <td class="d-none d-lg-table-cell" th:text="${mascota.nombreDuenio ?: '-'}"></td>
                    <td th:text="${#temporals.format(mascota.fechaEliminacion, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/papelera/restaurar/{id}(id=${mascota.id})}"
                               class="btn btn-sm btn-success fw-bold"
                               onclick="return confirm('¿Restaurar esta mascota?')">
                                <i class="bi bi-arrow-counterclockwise"></i> Restaurar
                            </a>
                            <a th:href="@{/papelera/eliminar/{id}(id=${mascota.id})}"
                               class="btn btn-sm btn-danger fw-bold"
                               onclick="return confirm('¿Eliminar definitivamente?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${mascotas.empty}" class="text-center py-5 text-muted">
        <div style="font-size:64px;">🗑️</div>
        <h4>La papelera está vacía</h4>
    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
