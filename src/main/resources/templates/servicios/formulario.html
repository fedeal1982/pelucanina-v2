<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio - Servicio Integral para Mascotas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; padding: 35px;
            max-width: 500px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; font-size: 14px; }
        input, select, textarea {
            width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 14px; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 100px; }
        .btn {
            padding: 12px 20px; border-radius: 10px; border: none;
            font-weight: 600; cursor: pointer; font-size: 14px;
            text-decoration: none; display: inline-block; text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background: #f0f0f0; color: #555; width: 100%; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${esNuevo ? '➕ Nuevo Servicio' : '✏️ Editar Servicio'}">Servicio</h1>

    <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>

    <form th:action="${esNuevo ? '/servicios/nuevo' : '/servicios/editar/' + servicio.id}" method="post">

        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="nombre" required placeholder="Ej: Consulta general"
                   th:value="${servicio.nombre}">
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" placeholder="Descripción del servicio..."
                      th:text="${servicio.descripcion}"></textarea>
        </div>

        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" id="activo" name="activo" value="true"
                       th:checked="${servicio.activo}">
                <label for="activo" style="margin-bottom:0;">Servicio activo</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <a href="/servicios" class="btn btn-secondary">← Cancelar</a>
    </form>
</div>
</body>
</html>
