<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacunas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .mascota-info { background: #f8f9ff; border-radius: 12px; border-left: 4px solid #667eea; padding: 14px; }
        .vacuna-card { border: 1px solid #eee; border-radius: 12px; padding: 18px; margin-bottom: 14px; transition: box-shadow 0.2s; }
        .vacuna-card:hover { box-shadow: 0 4px 15px rgba(102,126,234,0.15); }
        .campo-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; }
        .proxima-dosis { background: #fff3cd; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #856404; }
        .proxima-dosis.vencida { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h1 class="h3 fw-bold mb-0" style="color:#667eea;">💉 Vacunas</h1>
        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/vacunas/nuevo/{id}(id=${mascota.numCliente})}" class="btn btn-grad btn-sm fw-bold">➕ Nueva Vacuna</a>
            <a href="/mascotas" class="btn btn-secondary btn-sm fw-bold">← Volver</a>
        </div>
    </div>

    <div class="mascota-info mb-3">
        <h2 class="h5 fw-bold mb-1" style="color:#667eea;">🐾 <span th:text="${mascota.nombre}"></span></h2>
        <p class="text-muted small mb-0" th:text="${(mascota.especie ?: '') + (mascota.unduenio != null ? ' · Dueño: ' + mascota.unduenio.nombre : '')}"></p>
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <div th:if="${!vacunas.empty}">
        <div th:each="v : ${vacunas}" class="vacuna-card">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                <span class="fw-bold fs-6">💉 <span th:text="${v.nombre}"></span></span>
                <span style="color:#667eea; font-size:13px; font-weight:600;"
                      th:text="'Aplicada: ' + ${#temporals.format(v.fechaAplicacion, 'dd/MM/yyyy')}"></span>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-12 col-md-6" th:if="${v.veterinario != null}">
                    <div class="campo-label">Veterinario</div>
                    <div th:text="${v.veterinario.nombreCompleto}"></div>
                </div>
                <div class="col-12 col-md-6" th:if="${v.observaciones}">
                    <div class="campo-label">Observaciones</div>
                    <div th:text="${v.observaciones}"></div>
                </div>
            </div>
            <div th:if="${v.proximaDosis != null}"
                 th:class="${v.proximaDosis.isBefore(#temporals.createToday()) ? 'proxima-dosis vencida mb-2' : 'proxima-dosis mb-2'}">
                <span th:if="${v.proximaDosis.isBefore(#temporals.createToday())}">⚠️ VENCIDA: </span>
                <span th:unless="${v.proximaDosis.isBefore(#temporals.createToday())}">⏰ Próxima dosis: </span>
                <strong th:text="${#temporals.format(v.proximaDosis, 'dd/MM/yyyy')}"></strong>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/vacunas/editar/{id}(id=${v.id})}" class="btn btn-warning btn-sm fw-bold">✏️ Editar</a>
                <a th:href="@{/vacunas/eliminar/{id}(id=${v.id})}"
                   class="btn btn-danger btn-sm fw-bold"
                   onclick="return confirm('¿Eliminar esta vacuna?')">🗑️ Eliminar</a>
            </div>
        </div>
    </div>

    <div th:if="${vacunas.empty}" class="text-center py-5 text-muted">
        <div style="font-size:48px;">💉</div>
        <p>No hay vacunas registradas</p>
        <a th:href="@{/vacunas/nuevo/{id}(id=${mascota.numCliente})}" class="btn btn-grad mt-2">➕ Primera vacuna</a>
    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
