<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .table thead th { border: none; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .filtro-btn { border: 2px solid #667eea; color: #667eea; background: white; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 600; text-decoration: none; display: inline-block; }
        .filtro-btn.activo { background: #667eea; color: white; }
        .filtro-btn:hover { background: #667eea; color: white; }
		/* Animaciones */
		@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
		@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
		.main-card { animation: fadeInDown 0.5s ease; }
		.table tbody tr { animation: fadeInUp 0.3s ease both; }
		.table tbody tr:nth-child(1) { animation-delay: 0.05s; }
		.table tbody tr:nth-child(2) { animation-delay: 0.1s; }
		.table tbody tr:nth-child(3) { animation-delay: 0.15s; }
		.table tbody tr:nth-child(4) { animation-delay: 0.2s; }
		.table tbody tr:nth-child(5) { animation-delay: 0.25s; }
		.table tbody tr:nth-child(n+6) { animation-delay: 0.3s; }
		.filtro-btn { transition: all 0.2s ease; }
		.badge { transition: all 0.2s ease; }
		.btn { transition: all 0.2s ease; }
		.btn:hover { transform: translateY(-2px); }
		.btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h1 class="h3 fw-bold mb-0" style="color:#667eea;">📅 Turnos</h1>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/turnos/calendario" class="btn btn-secondary btn-sm fw-bold">🗓️ Calendario</a>
            <a href="/turnos/nuevo" class="btn btn-grad btn-sm fw-bold">➕ Nuevo Turno</a>
            <a href="/" class="btn btn-secondary btn-sm fw-bold">← Volver</a>
        </div>
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <!-- Filtros -->
    <div class="d-flex gap-2 flex-wrap mb-3">
        <a th:href="@{/turnos}" th:class="${estadoFiltro == '' ? 'filtro-btn activo' : 'filtro-btn'}">Todos</a>
        <a th:href="@{/turnos(estado='PENDIENTE')}" th:class="${estadoFiltro == 'PENDIENTE' ? 'filtro-btn activo' : 'filtro-btn'}">⏳ Pendientes</a>
        <a th:href="@{/turnos(estado='COMPLETADO')}" th:class="${estadoFiltro == 'COMPLETADO' ? 'filtro-btn activo' : 'filtro-btn'}">✅ Completados</a>
        <a th:href="@{/turnos(estado='CANCELADO')}" th:class="${estadoFiltro == 'CANCELADO' ? 'filtro-btn activo' : 'filtro-btn'}">❌ Cancelados</a>
    </div>

    <div th:if="${!turnos.empty}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th>Mascota</th>
                    <th class="d-none d-md-table-cell">Servicio</th>
                    <th class="d-none d-lg-table-cell">Empleado</th>
                    <th class="d-none d-lg-table-cell">Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="turno : ${turnos}">
                    <td th:text="${#temporals.format(turno.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <strong th:text="${turno.mascota.nombre}"></strong>
                        <br><small class="text-muted" th:if="${turno.mascota.unduenio != null}"
                                   th:text="${turno.mascota.unduenio.nombre}"></small>
                    </td>
                    <td class="d-none d-md-table-cell" th:text="${turno.servicio ?: '-'}"></td>
                    <td class="d-none d-lg-table-cell" th:text="${turno.empleado != null ? turno.empleado.nombreCompleto : '-'}"></td>
                    <td class="d-none d-lg-table-cell" th:text="${turno.precio != null ? '$' + turno.precio : '-'}"></td>
                    <td>
                        <span th:if="${turno.estado == 'PENDIENTE'}" class="badge bg-warning text-dark">⏳ Pendiente</span>
                        <span th:if="${turno.estado == 'COMPLETADO'}" class="badge bg-success">✅ Completado</span>
                        <span th:if="${turno.estado == 'CANCELADO'}" class="badge bg-danger">❌ Cancelado</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/turnos/editar/{id}(id=${turno.id})}" class="btn btn-sm btn-warning" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:if="${turno.estado == 'PENDIENTE'}"
                               th:href="@{/turnos/cambiar-estado/{id}/COMPLETADO(id=${turno.id})}"
                               class="btn btn-sm btn-success" title="Completar">✅</a>
                            <a th:if="${turno.estado == 'PENDIENTE'}"
                               th:href="@{/turnos/cambiar-estado/{id}/CANCELADO(id=${turno.id})}"
                               class="btn btn-sm btn-warning" title="Cancelar">❌</a>
                            <a th:href="@{/turnos/eliminar/{id}(id=${turno.id})}"
                               class="btn btn-sm btn-danger" title="Eliminar"
                               onclick="return confirm('¿Eliminar este turno?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${turnos.empty}" class="text-center py-5 text-muted">
        <div style="font-size:48px;">📅</div>
        <p class="mt-2">No hay turnos registrados</p>
        <a href="/turnos/nuevo" class="btn btn-grad mt-2">➕ Crear primer turno</a>
    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
