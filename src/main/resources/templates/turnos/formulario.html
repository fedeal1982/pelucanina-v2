<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 580px; width: 100%; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; width: 100%; padding: 12px; font-weight: 700; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
		/* Animaciones */
		@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
		@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
		.main-card { animation: fadeInDown 0.5s ease; }
		.form-control, .form-select { transition: all 0.2s ease; }
		.btn { transition: all 0.2s ease; }
		.btn:hover { transform: translateY(-2px); }
		.btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="card main-card p-4">
    <h1 class="h4 fw-bold mb-4" style="color:#667eea;"
        th:text="${turno != null ? '✏️ Editar Turno' : '➕ Nuevo Turno'}">Turno</h1>

    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <form th:action="${turno != null ? '/turnos/editar/' + turno.id : '/turnos/nuevo'}" method="post">

        <div class="mb-3">
            <label class="form-label fw-semibold">Mascota <span class="text-danger">*</span></label>
            <input type="text" id="buscadorMascota" class="form-control mb-2"
                   placeholder="🔍 Buscar por nombre o dueño..." autocomplete="off" onkeyup="filtrarMascotas()">
            <select name="mascotaId" id="selectMascota" required class="form-select">
                <option th:each="m : ${mascotas}"
                        th:value="${m.numCliente}"
                        th:text="${m.nombre + (m.unduenio != null ? ' (' + m.unduenio.nombre + ')' : '')}"
                        th:selected="${turno != null && turno.mascota.numCliente == m.numCliente}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Fecha y Hora <span class="text-danger">*</span></label>
            <input type="datetime-local" name="fechaHora" class="form-control" required
                   th:value="${turno != null ? #temporals.format(turno.fechaHora, 'yyyy-MM-dd''T''HH:mm') : ''}">
        </div>

        <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Servicio</label>
                <select name="servicio" class="form-select">
                    <option value="">-- Seleccionar --</option>
                    <optgroup label="🏥 Veterinaria">
                        <option value="Consulta médica" th:selected="${turno != null && turno.servicio == 'Consulta médica'}">Consulta médica</option>
                        <option value="Cirugía" th:selected="${turno != null && turno.servicio == 'Cirugía'}">Cirugía</option>
                        <option value="Vacunación" th:selected="${turno != null && turno.servicio == 'Vacunación'}">Vacunación</option>
                        <option value="Desparasitación" th:selected="${turno != null && turno.servicio == 'Desparasitación'}">Desparasitación</option>
                        <option value="Control" th:selected="${turno != null && turno.servicio == 'Control'}">Control</option>
                    </optgroup>
                    <optgroup label="✂️ Peluquería">
                        <option value="Baño" th:selected="${turno != null && turno.servicio == 'Baño'}">Baño</option>
                        <option value="Corte" th:selected="${turno != null && turno.servicio == 'Corte'}">Corte</option>
                        <option value="Baño y corte" th:selected="${turno != null && turno.servicio == 'Baño y corte'}">Baño y corte</option>
                        <option value="Deslanado" th:selected="${turno != null && turno.servicio == 'Deslanado'}">Deslanado</option>
                        <option value="Antipulgas" th:selected="${turno != null && turno.servicio == 'Antipulgas'}">Antipulgas</option>
                        <option value="Corte de uñas" th:selected="${turno != null && turno.servicio == 'Corte de uñas'}">Corte de uñas</option>
                    </optgroup>
                </select>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Precio</label>
                <input type="number" name="precio" class="form-control" step="0.01" min="0" placeholder="0.00"
                       th:value="${turno != null ? turno.precio : ''}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Empleado asignado</label>
            <select name="empleadoId" class="form-select">
                <option value="">-- Sin asignar --</option>
                <option th:each="e : ${empleados}"
                        th:value="${e.id}"
                        th:text="${e.nombreCompleto}"
                        th:selected="${turno != null && turno.empleado != null && turno.empleado.id == e.id}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Estado</label>
            <select name="estado" class="form-select">
                <option value="PENDIENTE" th:selected="${turno == null || turno.estado == 'PENDIENTE'}">⏳ Pendiente</option>
                <option value="COMPLETADO" th:selected="${turno != null && turno.estado == 'COMPLETADO'}">✅ Completado</option>
                <option value="CANCELADO" th:selected="${turno != null && turno.estado == 'CANCELADO'}">❌ Cancelado</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="3" placeholder="Notas adicionales..."
                      th:text="${turno != null ? turno.observaciones : ''}"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-grad flex-fill">💾 Guardar Turno</button>
            <a href="/turnos" class="btn btn-secondary flex-fill fw-bold">← Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function filtrarMascotas() {
    const filtro = document.getElementById('buscadorMascota').value.toLowerCase();
    const select = document.getElementById('selectMascota');
    const opciones = select.querySelectorAll('option');
    opciones.forEach(op => {
        op.style.display = op.text.toLowerCase().includes(filtro) ? '' : 'none';
    });
}
document.getElementById('selectMascota').addEventListener('change', function() {
    document.getElementById('buscadorMascota').value = this.options[this.selectedIndex].text;
});
</script>
</body>
</html>
