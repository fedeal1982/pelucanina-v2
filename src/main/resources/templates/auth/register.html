<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pelucanina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px; width: 100%; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; width: 100%; padding: 12px; font-weight: 700; border-radius: 8px; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
    </style>
</head>
<body>
<div class="card p-4">
    <h1 class="h3 text-center fw-bold mb-1" style="color:#667eea;">📝 Registro</h1>
    <p class="text-center text-muted mb-4">Crear nueva cuenta</p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Nombre Completo</label>
            <input type="text" name="nombreCompleto" class="form-control" placeholder="Ej: Juan Pérez" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ej: juan.perez" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Ej: juan@email.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Rol</label>
            <select name="rol" class="form-select">
                <option value="EMPLEADO">Empleado</option>
                <option value="VETERINARIO">Veterinario</option>
            </select>
        </div>
        <button type="submit" class="btn btn-grad mb-2">✅ Registrar</button>
        <a href="/login" class="btn btn-secondary w-100">← Volver al Login</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
