<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios - Servicio Integral para Mascotas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; padding: 30px;
            max-width: 900px; margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; margin-bottom: 20px; font-size: 28px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .btn {
            padding: 10px 18px; border-radius: 10px; text-decoration: none;
            font-weight: 600; cursor: pointer; border: none; font-size: 14px; display: inline-block;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: middle; }
        tr:hover { background: #f8f9ff; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-activo { background: #d4edda; color: #155724; }
        .badge-inactivo { background: #f8d7da; color: #721c24; }
        .actions { display: flex; gap: 5px; flex-wrap: wrap; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .empty-state { text-align: center; padding: 40px; color: #aaa; }
        .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏥 Servicios</h1>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a href="/servicios/nuevo" class="btn btn-primary">➕ Nuevo Servicio</a>
            <a href="/" class="btn btn-secondary">← Volver</a>
        </div>
    </div>

    <div th:if="${mensajeExito}" class="alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>

    <div th:if="${!servicios.empty}">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td><strong th:text="${servicio.nombre}"></strong></td>
                    <td th:text="${servicio.descripcion ?: '-'}"></td>
                    <td>
                        <span th:if="${servicio.activo}" class="badge badge-activo">✅ Activo</span>
                        <span th:if="${!servicio.activo}" class="badge badge-inactivo">🔴 Inactivo</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/servicios/editar/{id}(id=${servicio.id})}" class="btn btn-warning btn-sm">✏️ Editar</a>
                            <a th:href="@{/servicios/toggle/{id}(id=${servicio.id})}"
                               th:class="${servicio.activo ? 'btn btn-secondary btn-sm' : 'btn btn-success btn-sm'}"
                               th:text="${servicio.activo ? '🔴 Desactivar' : '✅ Activar'}"></a>
                            <a th:href="@{/servicios/eliminar/{id}(id=${servicio.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este servicio?')">🗑️</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${servicios.empty}" class="empty-state">
        <div class="icon">🏥</div>
        <p>No hay servicios registrados</p>
        <a href="/servicios/nuevo" class="btn btn-primary" style="margin-top:15px;">➕ Crear primer servicio</a>
    </div>
</div>
</body>
</html>
