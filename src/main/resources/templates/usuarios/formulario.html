<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 480px; width: 100%; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
    </style>
</head>
<body>
<div class="card p-4">
    <h1 class="h4 fw-bold text-center mb-1" style="color:#667eea;">✏️ Editar Usuario</h1>
    <p class="text-center text-muted mb-4" th:text="${usuario.username}"></p>

    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <form th:action="@{/usuarios/editar/{id}(id=${usuario.id})}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Nombre Completo</label>
            <input type="text" name="nombreCompleto" class="form-control"
                   th:value="${usuario.nombreCompleto}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control"
                   th:value="${usuario.email}" placeholder="correo@email.com">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Rol</label>
            <select name="rol" class="form-select">
                <option value="ADMIN" th:selected="${usuario.rol == 'ADMIN'}">ADMIN</option>
                <option value="EMPLEADO" th:selected="${usuario.rol == 'EMPLEADO'}">EMPLEADO</option>
                <option value="VETERINARIO" th:selected="${usuario.rol == 'VETERINARIO'}">VETERINARIO</option>
            </select>
        </div>
        <button type="submit" class="btn btn-grad fw-bold w-100 mb-2">✅ Guardar Cambios</button>
        <a href="/usuarios" class="btn btn-secondary fw-bold w-100">← Cancelar</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
