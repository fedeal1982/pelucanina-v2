<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Detalle - ' + ${mascota.nombre}">Detalle Mascota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 700px; margin: 0 auto; }
        .section-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .section-title { color: #667eea; font-weight: 700; font-size: 17px; margin-bottom: 14px; }
        .field-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e9ecef; font-size: 14px; }
        .field-row:last-child { border-bottom: none; }
        .field-label { color: #666; font-weight: 600; }
        .field-value { color: #333; text-align: right; max-width: 60%; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .back-link { color: #667eea; text-decoration: none; font-weight: 600; }
        .observaciones-box { background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 8px; padding: 12px; color: #856404; font-size: 14px; }
		/* Animaciones */
		@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
		@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
		@keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
		.main-card { animation: fadeInDown 0.5s ease; }
		.section-box { animation: fadeInUp 0.4s ease both; }
		.section-box:nth-child(1) { animation-delay: 0.1s; }
		.section-box:nth-child(2) { animation-delay: 0.2s; }
		.section-box:nth-child(3) { animation-delay: 0.3s; }
		.text-center div[style] { animation: zoomIn 0.5s ease; }
		.btn { transition: all 0.2s ease; }
		.btn:hover { transform: translateY(-2px); }
		.btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <a href="/mascotas" class="back-link mb-3 d-inline-block">← Volver a la lista</a>

    <!-- Header -->
    <div class="text-center mb-4">
        <div style="font-size:72px;" th:text="${mascota.especie == 'Perro' ? '🐕' : mascota.especie == 'Gato' ? '🐈' : mascota.especie == 'Conejo' ? '🐇' : mascota.especie == 'Ave' ? '🦜' : mascota.especie == 'Reptil' ? '🦎' : '🐾'}"></div>
        <h1 class="h2 fw-bold mt-2" style="color:#667eea;" th:text="${mascota.nombre}">Max</h1>
        <p class="text-muted" th:text="${mascota.especie ?: ''}"></p>
        <span class="badge text-white" style="background:#667eea;" th:text="'Cliente N° ' + ${mascota.numCliente}"></span>
    </div>

    <!-- Datos mascota -->
    <div class="section-box">
        <div class="section-title">🐕 Datos de la Mascota</div>
        <div class="field-row">
            <span class="field-label">Especie</span>
            <span class="field-value" th:text="${mascota.especie ?: '-'}"></span>
        </div>
        <div class="field-row">
            <span class="field-label">Fecha de Nacimiento</span>
            <span class="field-value" th:text="${mascota.fechaNacimiento != null ? #temporals.format(mascota.fechaNacimiento, 'dd/MM/yyyy') : '-'}"></span>
        </div>
        <div class="field-row">
            <span class="field-label">Color</span>
            <span class="field-value" th:text="${mascota.color ?: '-'}"></span>
        </div>
        <div class="field-row">
            <span class="field-label">Alérgico</span>
            <span class="field-value">
                <span th:if="${mascota.alergico == 'SI'}" class="badge bg-danger">⚠️ SI</span>
                <span th:if="${mascota.alergico == 'NO'}" class="badge bg-success">✅ NO</span>
                <span th:if="${mascota.alergico == null || mascota.alergico == '-'}" class="badge bg-secondary">-</span>
            </span>
        </div>
        <div class="field-row">
            <span class="field-label">Atención Especial</span>
            <span class="field-value">
                <span th:if="${mascota.atencionEspecial == 'SI'}" class="badge bg-danger">⚠️ SI</span>
                <span th:if="${mascota.atencionEspecial == 'NO'}" class="badge bg-success">✅ NO</span>
                <span th:if="${mascota.atencionEspecial == null || mascota.atencionEspecial == '-'}" class="badge bg-secondary">-</span>
            </span>
        </div>
        <div th:if="${mascota.observaciones}" class="mt-3">
            <div class="field-label mb-2">Observaciones</div>
            <div class="observaciones-box" th:text="${mascota.observaciones}"></div>
        </div>
    </div>

    <!-- Datos dueño -->
    <div class="section-box" th:if="${mascota.unduenio != null}">
        <div class="section-title">👤 Datos del Dueño</div>
        <div class="field-row">
            <span class="field-label">Nombre</span>
            <span class="field-value" th:text="${mascota.unduenio.nombre ?: '-'}"></span>
        </div>
        <div class="field-row">
            <span class="field-label">Celular</span>
            <span class="field-value" th:text="${mascota.unduenio.celDuenio ?: '-'}"></span>
        </div>
        <div class="field-row">
            <span class="field-label">Dirección</span>
            <span class="field-value" th:text="${mascota.unduenio.direccion ?: '-'}"></span>
        </div>
        <div class="field-row">
            <span class="field-label">Código Postal</span>
            <span class="field-value" th:text="${mascota.unduenio.codigoPostal ?: '-'}"></span>
        </div>
    </div>

    <!-- Botones -->
    <div class="row g-2 mt-2">
        <div class="col-6 col-md-4">
            <a th:href="@{/historial/mascota/{id}(id=${mascota.numCliente})}"
               class="btn btn-grad w-100 fw-bold">📋 Historial</a>
        </div>
        <div class="col-6 col-md-4">
            <a th:href="@{/vacunas/mascota/{id}(id=${mascota.numCliente})}"
               class="btn btn-grad w-100 fw-bold">💉 Vacunas</a>
        </div>
        <div class="col-6 col-md-4">
            <a th:href="@{/mascotas/editar/{id}(id=${mascota.numCliente})}"
               class="btn btn-warning w-100 fw-bold">✏️ Editar</a>
        </div>
        <div class="col-6 col-md-4">
            <a th:href="@{/mascotas/eliminar/{id}(id=${mascota.numCliente})}"
               class="btn btn-danger w-100 fw-bold"
               onclick="return confirm('¿Mover a la papelera?')">🗑️ Eliminar</a>
        </div>
        <div class="col-6 col-md-4">
            <a th:href="@{/pdf/mascota/{id}(id=${mascota.numCliente})}"
               class="btn btn-secondary w-100 fw-bold">📄 PDF</a>
        </div>
    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
