<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${esNuevo ? 'Nueva Mascota' : 'Editar Mascota'}">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .section-box { background: #f8f9fa; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .section-title { color: #667eea; font-weight: 700; font-size: 18px; margin-bottom: 16px; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .back-link { color: #667eea; text-decoration: none; font-weight: 600; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4" style="max-width:800px; margin:0 auto;">

    <a href="/mascotas" class="back-link mb-3 d-inline-block">← Volver a la lista</a>
    <h1 class="h3 fw-bold mb-4" style="color:#667eea;"
        th:text="${esNuevo ? '➕ Nueva Mascota' : '✏️ Editar Mascota'}">Formulario</h1>

    <form th:action="${esNuevo ? '/mascotas' : '/mascotas/editar/' + mascota.numCliente}"
          method="post" th:object="${mascota}">

        <!-- Datos de la Mascota -->
        <div class="section-box">
            <div class="section-title">🐾 Datos de la Mascota</div>
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Max" required>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Especie</label>
                    <select class="form-select" id="especie" name="especie" onchange="mostrarOtroEspecie(this)">
                        <option value="">-- Seleccionar --</option>
                        <option value="Perro">🐕 Perro</option>
                        <option value="Gato">🐈 Gato</option>
                        <option value="Conejo">🐇 Conejo</option>
                        <option value="Ave">🦜 Ave</option>
                        <option value="Reptil">🦎 Reptil</option>
                        <option value="Otro">🐾 Otro</option>
                    </select>
                </div>
                <div class="col-12 col-md-6" id="otroEspecieGroup" style="display:none;">
                    <label class="form-label fw-semibold">Especificá la especie</label>
                    <input type="text" class="form-control" id="especiePersonalizada" placeholder="Ej: Hamster, Tortuga...">
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Fecha de Nacimiento</label>
                    <input type="date" class="form-control" th:field="*{fechaNacimiento}">
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Color</label>
                    <input type="text" class="form-control" th:field="*{color}" placeholder="Ej: Marrón">
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Alérgico</label>
                    <select class="form-select" th:field="*{alergico}">
                        <option value="-">-</option>
                        <option value="SI">SI</option>
                        <option value="NO">NO</option>
                    </select>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Atención Especial</label>
                    <select class="form-select" th:field="*{atencionEspecial}">
                        <option value="-">-</option>
                        <option value="SI">SI</option>
                        <option value="NO">NO</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Observaciones</label>
                    <textarea class="form-control" th:field="*{observaciones}" rows="3"
                              placeholder="Notas adicionales..."></textarea>
                </div>
            </div>
        </div>

        <!-- Datos del Dueño -->
        <div class="section-box">
            <div class="section-title">👤 Datos del Dueño</div>
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{unduenio.nombre}"
                           placeholder="Nombre completo" required>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Celular <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{unduenio.celDuenio}"
                           placeholder="Ej: 3512345678" required>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Dirección <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{unduenio.direccion}"
                           placeholder="Calle y número" required>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Código Postal</label>
                    <input type="text" class="form-control" th:field="*{unduenio.codigoPostal}"
                           placeholder="Ej: 5000">
                </div>
            </div>
        </div>

        <!-- Botones -->
        <div class="d-flex gap-3 mt-2">
            <button type="submit" class="btn btn-grad fw-bold flex-fill"
                    th:text="${esNuevo ? '💾 Guardar' : '✅ Actualizar'}">Guardar</button>
            <button type="button" class="btn btn-secondary fw-bold flex-fill"
                    onclick="window.location.href='/mascotas'">❌ Cancelar</button>
        </div>
    </form>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function mostrarOtroEspecie(select) {
    const grupo = document.getElementById('otroEspecieGroup');
    const input = document.getElementById('especiePersonalizada');
    if (select.value === 'Otro') {
        grupo.style.display = 'block';
        input.setAttribute('required', 'required');
        input.addEventListener('input', function() { select.value = this.value || 'Otro'; });
    } else {
        grupo.style.display = 'none';
        input.removeAttribute('required');
    }
}
</script>
</body>
</html>
