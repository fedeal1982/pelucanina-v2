<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Servicio Integral para Mascotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 420px; width: 100%; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; width: 100%; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 8px; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .titulo { color: #667eea; font-weight: 700; }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <h1 class="h3 text-center titulo mb-1">🐾 Bienvenido</h1>
    <p class="text-center text-muted mb-4">Servicio Integral para Mascotas</p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
        </div>
        <button type="submit" class="btn btn-grad">🔐 Iniciar Sesión</button>
    </form>

    <div class="text-center mt-3">
        <a href="/recuperar-password" class="text-decoration-none" style="color:#667eea; font-size:14px;">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="text-center mt-2 text-muted" style="font-size:14px;">
        ¿No tiene cuenta? <a href="/register" class="fw-semibold text-decoration-none" style="color:#667eea;">Regístrese aquí</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
