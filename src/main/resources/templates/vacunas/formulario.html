<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacuna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 550px; width: 100%; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
    </style>
</head>
<body>
<div class="card main-card p-4">
    <h1 class="h4 fw-bold mb-1" style="color:#667eea;"
        th:text="${esNuevo ? '➕ Nueva Vacuna' : '✏️ Editar Vacuna'}">Vacuna</h1>
    <span class="badge mb-3" style="background:#f0f4ff; color:#667eea;">🐾 <span th:text="${mascota.nombre}"></span></span>

    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <form th:action="${esNuevo ? '/vacunas/nuevo/' + mascota.numCliente : '/vacunas/editar/' + vacuna.id}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Nombre de la vacuna <span class="text-danger">*</span></label>
            <input type="text" name="nombre" class="form-control" required
                   placeholder="Ej: Antirrábica, Sextuple..." th:value="${vacuna.nombre}">
        </div>
        <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Fecha de aplicación <span class="text-danger">*</span></label>
                <input type="date" name="fechaAplicacion" class="form-control" required
                       th:value="${vacuna.fechaAplicacion != null ? vacuna.fechaAplicacion : #temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Próxima dosis</label>
                <input type="date" name="proximaDosis" class="form-control"
                       th:value="${vacuna.proximaDosis}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Veterinario</label>
            <select name="veterinarioId" class="form-select">
                <option value="">-- Sin asignar --</option>
                <option th:each="v : ${veterinarios}" th:value="${v.id}" th:text="${v.nombreCompleto}"
                        th:selected="${vacuna.veterinario != null && vacuna.veterinario.id == v.id}"></option>
            </select>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="3"
                      th:text="${vacuna.observaciones}"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-grad fw-bold flex-fill">💾 Guardar Vacuna</button>
            <a th:href="@{/vacunas/mascota/{id}(id=${mascota.numCliente})}" class="btn btn-secondary fw-bold flex-fill">← Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
