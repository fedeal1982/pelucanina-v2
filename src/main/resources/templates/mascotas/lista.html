<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Mascotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 0; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .table thead th { border: none; font-weight: 600; }
        .btn-grad { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-grad:hover { opacity: 0.9; color: white; }
        .back-link { color: #667eea; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; color: #667eea; }
    </style>
</head>
<body>
<div class="container py-3">
<div class="card main-card p-4">

    <a href="/" class="back-link mb-3 d-inline-block">← Volver al inicio</a>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h1 class="h3 fw-bold mb-0" style="color:#667eea;">📋 Lista de Mascotas</h1>
        <a href="/mascotas/nueva" class="btn btn-grad fw-bold">
            <i class="bi bi-plus-circle"></i> Nueva Mascota
        </a>
    </div>

    <!-- Buscador -->
    <form th:action="@{/mascotas}" method="get" class="d-flex gap-2 mb-3 flex-wrap">
        <input type="text" name="buscar" th:value="${buscar}" class="form-control"
               placeholder="🔍 Buscar por nombre o dueño..." style="min-width:200px; flex:1;">
        <button type="submit" class="btn btn-grad fw-bold">Buscar</button>
        <a href="/mascotas" class="btn btn-secondary fw-bold">Limpiar</a>
    </form>

    <div th:if="${buscar}" class="mb-2 fw-semibold" style="color:#667eea;">
        Resultados para: "<span th:text="${buscar}"></span>" —
        <span th:text="${mascotas.size()}">0</span> resultado(s)
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <!-- Tabla -->
    <div th:if="${!mascotas.empty}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th class="d-none d-md-table-cell">Especie</th>
                    <th class="d-none d-md-table-cell">Color</th>
                    <th class="d-none d-lg-table-cell">Alérgico</th>
                    <th>Dueño</th>
                    <th class="d-none d-lg-table-cell">Celular</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="mascota : ${mascotas}">
                    <td th:text="${mascota.numCliente}"></td>
                    <td class="fw-semibold" th:text="${mascota.nombre}"></td>
                    <td class="d-none d-md-table-cell" th:text="${mascota.especie ?: '-'}"></td>
                    <td class="d-none d-md-table-cell" th:text="${mascota.color ?: '-'}"></td>
                    <td class="d-none d-lg-table-cell" th:text="${mascota.alergico ?: '-'}"></td>
                    <td th:text="${mascota.unduenio != null ? mascota.unduenio.nombre : '-'}"></td>
                    <td class="d-none d-lg-table-cell" th:text="${mascota.unduenio != null ? mascota.unduenio.celDuenio : '-'}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/mascotas/{id}(id=${mascota.numCliente})}"
                               class="btn btn-sm btn-info text-white" title="Ver">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/mascotas/editar/{id}(id=${mascota.numCliente})}"
                               class="btn btn-sm btn-warning" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/mascotas/eliminar/{id}(id=${mascota.numCliente})}"
                               class="btn btn-sm btn-danger" title="Eliminar"
                               onclick="return confirm('¿Eliminar esta mascota?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Estado vacío -->
    <div th:if="${mascotas.empty}" class="text-center py-5 text-muted">
        <div style="font-size:64px;">📭</div>
        <h4>No hay mascotas registradas</h4>
        <a href="/mascotas/nueva" class="btn btn-grad mt-3">➕ Nueva Mascota</a>
    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
